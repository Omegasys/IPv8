# IPv8 Global Configuration

network_mode=hybrid
default_hops=2

enable_ipv4_translation=true
enable_ipv6_translation=true

security_level=balanced

encryption=aes-256-gcm
hashing=sha256

routing_mode=adaptive
directional_routing=true

proxy_support=true
tor_support=true

packet_checksum=optional
mtu_mode=adaptive

session_rotation=true
address_rotation=true
